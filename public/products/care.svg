<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="careGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#careGrad)"/>
  <!-- Sensor module -->
  <rect x="110" y="120" width="180" height="140" rx="16" fill="#3B82F6" opacity="0.15"/>
  <rect x="120" y="130" width="160" height="120" rx="12" fill="white" opacity="0.9"/>
  <!-- Heart rate wave -->
  <polyline points="140,190 160,190 170,160 180,210 190,175 200,195 210,190 230,190 240,165 250,210 260,185 270,190"
    stroke="#E8553A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Heart icon -->
  <text x="200" y="155" text-anchor="middle" font-size="24" fill="#E8553A">❤️</text>
  <!-- BPM text -->
  <text x="200" y="235" text-anchor="middle" font-size="14" fill="#3B82F6" font-family="sans-serif" font-weight="bold">72 BPM</text>
  <!-- Notification bell -->
  <circle cx="310" cy="140" r="20" fill="#FF8C42" opacity="0.15"/>
  <text x="310" y="148" text-anchor="middle" font-size="20">🔔</text>
  <!-- Phone icon -->
  <circle cx="310" cy="200" r="20" fill="#3B82F6" opacity="0.15"/>
  <text x="310" y="208" text-anchor="middle" font-size="20">📱</text>
  <!-- Connection dots -->
  <circle cx="200" cy="300" r="6" fill="#3B82F6" opacity="0.3"/>
  <circle cx="220" cy="310" r="4" fill="#3B82F6" opacity="0.2"/>
  <circle cx="240" cy="315" r="3" fill="#3B82F6" opacity="0.15"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-size="18" font-weight="bold" fill="#2D3436" font-family="sans-serif">暖暖·护 CozPal Care</text>
</svg>
