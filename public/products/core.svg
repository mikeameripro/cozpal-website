<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FFD166;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42"/>
      <stop offset="100%" style="stop-color:#E8553A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#coreGrad)"/>
  <!-- Chip body -->
  <rect x="120" y="120" width="160" height="160" rx="16" fill="url(#chipGrad)" opacity="0.9"/>
  <!-- Chip pins -->
  <g stroke="#FF8C42" stroke-width="3" opacity="0.6">
    <line x1="150" y1="120" x2="150" y2="90"/>
    <line x1="200" y1="120" x2="200" y2="90"/>
    <line x1="250" y1="120" x2="250" y2="90"/>
    <line x1="150" y1="280" x2="150" y2="310"/>
    <line x1="200" y1="280" x2="200" y2="310"/>
    <line x1="250" y1="280" x2="250" y2="310"/>
    <line x1="120" y1="160" x2="90" y2="160"/>
    <line x1="120" y1="200" x2="90" y2="200"/>
    <line x1="120" y1="240" x2="90" y2="240"/>
    <line x1="280" y1="160" x2="310" y2="160"/>
    <line x1="280" y1="200" x2="310" y2="200"/>
    <line x1="280" y1="240" x2="310" y2="240"/>
  </g>
  <!-- Brain icon -->
  <text x="200" y="215" text-anchor="middle" font-size="60" fill="white">🧠</text>
  <!-- Label -->
  <text x="200" y="360" text-anchor="middle" font-size="18" font-weight="bold" fill="#2D3436" font-family="sans-serif">暖暖·芯 CozPal Core</text>
</svg>
